<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEFR Vocabulary Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --success: #10b981;
            --error: #ef4444;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 20px 25px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-dark);
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, #1e40af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1em;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
            animation: slideDown 0.6s ease-out 0.1s both;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #3b82f6);
            transition: width 0.4s ease;
            border-radius: 10px;
        }

        .question-container {
            background: var(--bg-white);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 30px;
            animation: fadeInUp 0.6s ease-out;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }

        .question-number {
            font-size: 0.9em;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .score-badge {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .word-main {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
            word-break: break-word;
        }

        .word-label {
            font-size: 0.9em;
            color: var(--text-muted);
            margin-bottom: 25px;
            font-style: italic;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 16px 18px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--bg-light);
            font-size: 1em;
            line-height: 1.5;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .option:hover:not(.disabled) {
            border-color: var(--primary);
            background: #eff6ff;
            transform: translateX(4px);
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 1;
        }

        .option.correct {
            background: #ecfdf5;
            border-color: var(--success);
            color: var(--success);
            font-weight: 600;
        }

        .option.incorrect {
            background: #fef2f2;
            border-color: var(--error);
            color: var(--error);
            font-weight: 600;
        }

        .option::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: transparent;
            transition: background 0.3s ease;
        }

        .option.correct::before {
            background: var(--success);
        }

        .option.incorrect::before {
            background: var(--error);
        }

        .checkmark, .xmark {
            margin-right: 8px;
            font-weight: bold;
        }

        .results-container {
            background: var(--bg-white);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            animation: fadeInUp 0.6s ease-out;
        }

        .results-title {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-dark);
        }

        .score-circle {
            width: 120px;
            height: 120px;
            margin: 20px auto;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5em;
            font-weight: 700;
            box-shadow: var(--shadow-lg);
        }

        .cefr-level {
            font-size: 3em;
            font-weight: 700;
            margin: 20px 0;
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
        }

        .cefr-a1 { background: #fef3c7; color: #92400e; }
        .cefr-a2 { background: #fee2e2; color: #7f1d1d; }
        .cefr-b1 { background: #dbeafe; color: #0c2340; }
        .cefr-b2 { background: #d1fae5; color: #065f46; }
        .cefr-c { background: #f3e8ff; color: #5b21b6; }

        .cefr-description {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .btn-group {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .restart-button, .continue-button {
            border: none;
            padding: 14px 40px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: white;
            text-decoration: none;
        }

        .restart-button {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        }

        .continue-button {
            background: linear-gradient(135deg, var(--success), #059669);
            display: inline-block;
        }

        .restart-button:hover, .continue-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            filter: brightness(1.1);
        }

        .hidden { display: none; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid var(--border);
        }

        .stat-item { text-align: center; }
        .stat-number { font-size: 2em; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.9em; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; }

        @media (max-width: 600px) {
            .header h1 { font-size: 2em; }
            .question-container { padding: 20px; }
            .word-main { font-size: 1.5em; }
            .option { padding: 14px 16px; font-size: 0.95em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CEFR Vocabulary Test</h1>
            <p>Discover your English language level</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div id="testContent"></div>
        <div id="resultsContainer" class="hidden"></div>
    </div>

    <script>
        const questions = [
            { word: "Ameliorate", explanation: "Choose the phrase that best explains this word", options: [{ text: "To make something worse or more difficult", correct: false }, { text: "To make something better or improve it", correct: true }, { text: "To make something smaller or reduce it", correct: false }, { text: "To make something more complicated", correct: false }] },
            { word: "Ephemeral", explanation: "Choose the phrase that best explains this word", options: [{ text: "Lasting for a very short time; temporary", correct: true }, { text: "Something that is very strong and durable", correct: false }, { text: "A type of artistic movement", correct: false }, { text: "A mineral or precious stone", correct: false }] },
            { word: "Obfuscate", explanation: "Choose the phrase that best explains this word", options: [{ text: "To observe something carefully", correct: false }, { text: "To make something unclear or hard to understand", correct: true }, { text: "To organize something in order", correct: false }, { text: "To criticize someone harshly", correct: false }] },
            { word: "Pragmatic", explanation: "Choose the phrase that best explains this word", options: [{ text: "Dealing with things in a practical, realistic way", correct: true }, { text: "Refusing to consider other viewpoints", correct: false }, { text: "Using too many difficult words", correct: false }, { text: "Being overly emotional about decisions", correct: false }] },
            { word: "Serendipity", explanation: "Choose the phrase that best explains this word", options: [{ text: "Finding something good by accident or luck", correct: true }, { text: "A planned and calculated outcome", correct: false }, { text: "A feeling of deep sadness", correct: false }, { text: "A type of rare disease", correct: false }] },
            { word: "Cogent", explanation: "Choose the phrase that best explains this word", options: [{ text: "Appealing strongly to the mind; compelling and convincing", correct: true }, { text: "Extremely difficult to understand", correct: false }, { text: "Related to thinking or awareness", correct: false }, { text: "Absent-minded or forgetful", correct: false }] },
            { word: "Perspicacious", explanation: "Choose the phrase that best explains this word", options: [{ text: "Having keen insight and understanding; perceptive", correct: true }, { text: "Having good eyesight or vision", correct: false }, { text: "Being overly critical of others", correct: false }, { text: "Showing excessive enthusiasm", correct: false }] },
            { word: "Prevaricate", explanation: "Choose the phrase that best explains this word", options: [{ text: "To speak or act evasively; to tell lies", correct: true }, { text: "To arrive earlier than expected", correct: false }, { text: "To prevent something from happening", correct: false }, { text: "To go before someone in a procession", correct: false }] },
            { word: "Sanguine", explanation: "Choose the phrase that best explains this word", options: [{ text: "Optimistic and positive about the future", correct: true }, { text: "Showing signs of anger or aggression", correct: false }, { text: "Related to blood or bloodshed", correct: false }, { text: "Extremely cautious and fearful", correct: false }] },
            { word: "Ubiquitous", explanation: "Choose the phrase that best explains this word", options: [{ text: "Extremely rare or hard to find", correct: false }, { text: "Present, appearing, or found everywhere", correct: true }, { text: "Very large and difficult to move", correct: false }, { text: "Causing discomfort or irritation", correct: false }] }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        function initializeTest() { renderQuestion(); }

        function renderQuestion() {
            const testContent = document.getElementById('testContent');
            const question = questions[currentQuestion];
            const progressPercentage = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progressPercentage + '%';

            const optionsHTML = question.options.map((option, index) => `
                <div class="option" onclick="selectOption(${index})" id="option-${index}">
                    <span id="indicator-${index}"></span>
                    ${option.text}
                </div>
            `).join('');

            testContent.innerHTML = `
                <div class="question-container">
                    <div class="question-header">
                        <span class="question-number">Question ${currentQuestion + 1} of ${questions.length}</span>
                        <span class="score-badge">${score} / ${questions.length * 5} points</span>
                    </div>
                    <div class="word-main">${question.word}</div>
                    <div class="word-label">${question.explanation}</div>
                    <div class="options">${optionsHTML}</div>
                </div>
            `;
            answered = false;
        }

        function selectOption(index) {
            if (answered) return;
            answered = true;
            const question = questions[currentQuestion];
            const selectedOption = question.options[index];

            question.options.forEach((option, i) => {
                const optEl = document.getElementById(`option-${i}`);
                const indEl = document.getElementById(`indicator-${i}`);
                if (option.correct) {
                    optEl.classList.add('correct', 'disabled');
                    indEl.textContent = '✓ ';
                    indEl.className = 'checkmark';
                } else {
                    optEl.classList.add('incorrect', 'disabled');
                    indEl.textContent = '✕ ';
                    indEl.className = 'xmark';
                }
            });

            if (selectedOption.correct) score += 5;

            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) renderQuestion();
                else showResults();
            }, 1500);
        }

        function showResults() {
            const testContent = document.getElementById('testContent');
            const resultsContainer = document.getElementById('resultsContainer');
            testContent.classList.add('hidden');

            let cefrLevel, cefrDescription, levelClass;
            if (score <= 20) { cefrLevel = 'A1'; cefrDescription = 'Beginner'; levelClass = 'cefr-a1'; }
            else if (score < 30) { cefrLevel = 'A2'; cefrDescription = 'Elementary'; levelClass = 'cefr-a2'; }
            else if (score < 40) { cefrLevel = 'B1'; cefrDescription = 'Intermediate'; levelClass = 'cefr-b1'; }
            else if (score < 50) { cefrLevel = 'B2'; cefrDescription = 'Upper Intermediate'; levelClass = 'cefr-b2'; }
            else { cefrLevel = 'C1'; cefrDescription = 'Advanced'; levelClass = 'cefr-c'; }

            resultsContainer.innerHTML = `
                <div class="results-container">
                    <div class="results-title">Test Complete!</div>
                    <div class="score-circle">${score}</div>
                    <div class="cefr-level ${levelClass}">${cefrLevel}</div>
                    <p class="cefr-description">${cefrDescription}</p>
                    <div class="stats-row">
                        <div class="stat-item"><div class="stat-number">${Math.round((score/50)*100)}%</div><div class="stat-label">Score</div></div>
                        <div class="stat-item"><div class="stat-number">${score/5}</div><div class="stat-label">Correct</div></div>
                    </div>
                    <div class="btn-group">
                        <button class="restart-button" onclick="restartTest()">Retake</button>
                        <!-- INSERT YOUR YO SCENARIO LINK IN THE HREF BELOW -->
                        <a href="https://player.yoscenario.com/3826-3926-GZuuDqkH7D4FGjQ5" class="continue-button" target="_blank">Continue to Course</a>
                    </div>
                </div>
            `;
            resultsContainer.classList.remove('hidden');
        }

        function restartTest() {
            currentQuestion = 0; score = 0;
            document.getElementById('testContent').classList.remove('hidden');
            document.getElementById('resultsContainer').classList.add('hidden');
            renderQuestion();
        }

        initializeTest();
    </script>
</body>
</html>
